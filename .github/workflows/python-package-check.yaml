name: Python package check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Check for python ${{ matrix.python-version }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14", "3.14t"]

    steps:
      - uses: actions/checkout@v7
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install Act dependencies
        if: ${{ env.ACT }}
        run: |
          apt-get update && apt-get install sudo -y cargo
      - name: Install dependencies
        run: |
          uv sync --all-groups
      - name: Lint with ruff
        run: |
          uv run ruff check
          uv run ruff format --check
      - name: Check types with ty
        run: |
          uv run ty check
      - name: Check docstrings with pydoclint
        run: |
          uv run pydoclint --style google ./mtpy
