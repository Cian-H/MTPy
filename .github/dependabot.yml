version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    reviewers:
      - "Cian-H"
    assignees:
      - "Cian-H"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      major-updates:
        update-types:
          - "version-update:semver-major"
      minor-patch-updates:
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      major-updates:
        update-types:
          - "version-update:semver-major"
      minor-patch-updates:
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
